<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WOLFFY Mobile HW: Hello (B2)</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Outfit:wght@300;400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        adele: {
                            bg: '#141210',
                            panel: '#1f1c18',
                            border: '#3d3731',
                            gold: '#c8b292',
                            light: '#e8dcc7',
                            accent: '#8b6f4e',
                            wrong: '#ef4444'
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        vintage: ['"Playfair Display"', 'serif'],
                        mono: ['"Share Tech Mono"', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #141210;
            background-image: radial-gradient(circle at 50% 0%, #1f1c18 0%, #141210 70%);
            color: #e8dcc7;
            font-family: 'Outfit', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 0; user-select: none;
        }

        .mobile-wrapper {
            width: 100%; max-width: 430px; height: 100vh; max-height: 100vh;
            background-color: #141210; position: relative; overflow-x: hidden; overflow-y: auto; scroll-behavior: smooth;
        }
        @media (min-width: 640px) {
            .mobile-wrapper {
                height: 90vh; border-radius: 4px; border: 1px solid #3d3731;
                box-shadow: 0 25px 50px -12px rgba(200, 178, 146, 0.1), inset 0 0 0 2px #1f1c18;
            }
        }
        .mobile-wrapper::-webkit-scrollbar { width: 4px; }
        .mobile-wrapper::-webkit-scrollbar-track { background: transparent; }
        .mobile-wrapper::-webkit-scrollbar-thumb { background: #c8b292; border-radius: 10px; }

        .question-card { background-color: rgba(31, 28, 24, 0.8); border: 1px solid #3d3731; backdrop-filter: blur(8px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .question-card.active { border-color: #e8dcc7; box-shadow: 0 0 15px rgba(232, 220, 199, 0.1); }

        .option-btn { transition: all 0.2s; border-left: 4px solid transparent; background-color: #141210; border: 1px solid #3d3731;}
        .option-btn:hover:not(:disabled) { background: rgba(232, 220, 199, 0.05); border-color: #e8dcc7; transform: translateX(4px); }
        .option-btn.correct { background-color: #e8dcc7 !important; color: #141210 !important; border-color: #e8dcc7 !important; font-weight: bold; box-shadow: 0 0 15px rgba(232,220,199,0.4); }
        .option-btn.wrong { background-color: #ef4444 !important; color: white !important; border-color: #ef4444 !important; font-weight: bold; box-shadow: 0 0 15px rgba(239,68,68,0.4); }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.6; }

        .shake { animation: shake 0.4s both; border-color: #ef4444 !important; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(3px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-5px, 0, 0); } 40%, 60% { transform: translate3d(5px, 0, 0); } }

        .progress-point { transition: all 0.3s; }
        .progress-point.filled { background-color: #e8dcc7; box-shadow: 0 0 8px #e8dcc7; }

        .confetti { position: absolute; width: 6px; height: 12px; opacity: 0; z-index: 100; box-shadow: 0 0 5px currentColor;}
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

        .vinyl-spin { animation: spin 5s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="mobile-wrapper" id="app-container">
        
        <header class="sticky top-0 z-50 bg-[#141210]/95 backdrop-blur-md border-b border-adele-border px-6 pt-5 pb-3 shadow-md">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="font-vintage font-bold text-adele-light tracking-widest text-xl uppercase italic">WOLFFY <span class="text-adele-gold">B2</span></h1>
                    <p class="font-mono text-[10px] text-adele-gold uppercase tracking-widest font-bold">HW TAPE • ADELE</p>
                </div>
                <div class="text-right bg-adele-panel px-3 py-1 rounded border border-adele-border">
                    <span id="score-counter" class="font-mono text-xs font-bold text-adele-light tracking-widest">0/15 HITS</span>
                </div>
            </div>
            <div class="flex justify-between gap-1 mb-1" id="progress-container"></div>
        </header>

        <main class="p-4 pb-32 space-y-6">
            
            <div class="bg-adele-panel p-5 rounded border border-adele-border relative overflow-hidden flex flex-col items-center text-center shadow-[0_10px_20px_rgba(0,0,0,0.5)]">
                <div class="absolute w-32 h-32 bg-adele-light/5 rounded-full blur-2xl top-0 left-0"></div>
                <div class="w-24 h-24 rounded-full border-4 border-[#3d3731] border-t-adele-light animate-spin mb-4 shadow-[0_0_15px_rgba(232,220,199,0.2)] flex items-center justify-center z-10">
                    <div class="w-20 h-20 rounded-full overflow-hidden vinyl-spin border border-black bg-[#141210] flex items-center justify-center relative">
                        <img src="https://upload.wikimedia.org/wikipedia/en/8/85/Adele_-_Hello_%28Official_Single_Cover%29.png" class="absolute inset-0 w-full h-full object-cover opacity-60 sepia mix-blend-screen grayscale">
                        <div class="w-4 h-4 bg-black rounded-full z-20 border border-adele-light/20"></div>
                    </div>
                </div>
                <div class="w-full bg-[#141210] mt-2 p-3 text-center border border-adele-border rounded z-10">
                    <h2 class="font-vintage font-bold text-adele-light text-xl uppercase tracking-widest italic">The Deduction Quiz</h2>
                    <p class="font-mono text-[10px] font-bold text-adele-gold mt-1 uppercase tracking-widest">Past Modals</p>
                </div>
            </div>

            <div id="quiz-container" class="space-y-6 relative z-10"></div>
        </main>

        <div class="sticky bottom-0 left-0 w-full bg-gradient-to-t from-[#141210] via-[#141210] to-transparent pt-12 pb-6 px-6 z-50">
            <button id="submit-btn" onclick="checkAllAndSubmit()" class="w-full bg-transparent border border-adele-light text-adele-light font-sans font-bold text-lg tracking-widest uppercase py-4 rounded shadow-[0_0_15px_rgba(232,220,199,0.1)] transition-all active:scale-95 flex items-center justify-center gap-3 hover:bg-adele-light hover:text-black">
                <i class="fa-solid fa-phone"></i>
                HANG UP
            </button>
        </div>

        <div id="success-overlay" class="fixed inset-0 bg-[#141210]/95 backdrop-blur-sm z-[100] flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 hidden">
            <div class="w-24 h-24 bg-adele-panel border-2 border-adele-light rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(232,220,199,0.4)] transform scale-50 transition-transform duration-500" id="success-badge">
                <i class="fa-solid fa-check text-5xl text-adele-light"></i>
            </div>
            <h1 class="font-vintage font-bold text-4xl text-adele-light mb-2 text-center tracking-widest italic">PROFOUND</h1>
            <div class="bg-adele-panel border border-adele-light px-8 py-2 rounded mb-6 mt-4 shadow-[0_0_15px_rgba(232,220,199,0.2)]">
                <div class="font-mono text-adele-light text-xl font-bold tracking-widest" id="final-score">SCORE: 15/15</div>
            </div>
            <p class="font-sans text-adele-gold text-sm mb-10 text-center max-w-[280px]">You mastered Past Modals of Deduction. The line is clear now.</p>
            <button onclick="location.reload()" class="bg-adele-light text-black font-sans font-bold px-10 py-4 rounded uppercase text-lg tracking-widest hover:bg-white transition-colors shadow-[0_0_15px_rgba(232,220,199,0.2)]">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "1. 'He didn't answer the phone. He ______ asleep.'", a: ["must have been", "should have been", "can have been"], c: 0 },
            { q: "2. What does 'to tear apart' mean emotionally?", a: ["To glue together", "To make someone feel extremely unhappy", "To cry"], c: 1 },
            { q: "3. 'I ______ a thousand times to tell you I'm sorry.'", a: ["must call", "must have called", "should call"], c: 1 },
            { q: "4. Which modal shows you are guessing something was impossible?", a: ["Couldn't have", "Must have", "Might have"], c: 0 },
            { q: "5. 'She got a perfect score. She ______ hard.'", a: ["must study", "might have study", "must have studied"], c: 2 },
            { q: "6. 'They say that time's supposed to ______ ya.'", a: ["heal", "hear", "hide"], c: 0 },
            { q: "7. 'I'm not sure where he went. He ______ home.'", a: ["must have gone", "might have gone", "should have gone"], c: 1 },
            { q: "8. 'It's so typical of me...' means...", a: ["It's unusual for me", "It's characteristic of me", "I don't know me"], c: 1 },
            { q: "9. 'We ______ out of time.' (We have no time left)", a: ["runned", "ran", "have run"], c: 2 },
            { q: "10. 'You saw Adele? You ______ dreaming!'", a: ["should have been", "must have been", "ought to be"], c: 1 },
            { q: "11. 'Hello from the outside' is a metaphor for...", a: ["Being isolated from someone's life", "Being in the garden", "Calling from another country"], c: 0 },
            { q: "12. What does 'closure' mean after a breakup?", a: ["Locking a door", "A sense of resolution and peace", "Starting a new fight"], c: 1 },
            { q: "13. 'He ______ left early. His car is still here.'", a: ["couldn't have", "must have", "should have"], c: 0 },
            { q: "14. 'I ______ done it, but I decided not to.'", a: ["could have", "must have", "should have"], c: 0 },
            { q: "15. Spoken reduction: 'Must have' sounds like...", a: ["Must of", "Musta", "Must to"], c: 1 }
        ];

        let userAnswers = Array(15).fill(null);
        let solvedCount = 0;

        function initQuiz() {
            const container = document.getElementById('quiz-container');
            const progress = document.getElementById('progress-container');
            
            quizData.forEach((item, idx) => {
                const dot = document.createElement('div');
                dot.className = `h-1 flex-1 bg-adele-light/20 rounded-full progress-point dot-${idx}`;
                progress.appendChild(dot);

                const card = document.createElement('div');
                card.className = `question-card rounded p-5 shadow-lg q-card-${idx}`;
                card.innerHTML = `
                    <p class="font-sans text-lg font-bold mb-4 tracking-wide text-adele-light leading-snug">${item.q}</p>
                    <div class="grid grid-cols-1 gap-2 font-sans tracking-wider text-sm">
                        ${item.a.map((opt, oIdx) => `
                            <button class="option-btn border border-adele-border text-adele-gold py-4 px-4 rounded text-left flex items-center justify-between group btn-${idx}-${oIdx}" onclick="answer(${idx}, ${oIdx})">
                                <span class="font-bold">${opt}</span>
                                <div class="w-4 h-4 rounded-sm border border-adele-border group-hover:border-adele-light transition-colors flex items-center justify-center text-[10px]"></div>
                            </button>
                        `).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function answer(qIdx, oIdx) {
            if (userAnswers[qIdx] !== null) return;

            const correct = quizData[qIdx].c;
            const btn = document.querySelector(`.btn-${qIdx}-${oIdx}`);
            const card = document.querySelector(`.q-card-${qIdx}`);
            const dot = document.querySelector(`.dot-${qIdx}`);
            const allBtnsInCard = card.querySelectorAll('.option-btn');

            allBtnsInCard.forEach(b => b.disabled = true);

            if (oIdx === correct) {
                btn.classList.add('correct');
                btn.classList.remove('text-adele-gold', 'bg-[#141210]');
                btn.querySelector('div').innerHTML = '<i class="fa-solid fa-check"></i>';
                btn.querySelector('div').className = 'w-4 h-4 flex items-center justify-center text-[10px] border-none text-[#141210]';
                userAnswers[qIdx] = true;
            } else {
                btn.classList.add('wrong');
                btn.classList.remove('text-adele-gold', 'bg-[#141210]');
                btn.querySelector('div').innerHTML = '<i class="fa-solid fa-xmark"></i>';
                btn.querySelector('div').className = 'w-4 h-4 flex items-center justify-center text-[10px] border-none text-white';
                
                const correctBtn = document.querySelector(`.btn-${qIdx}-${correct}`);
                correctBtn.classList.add('correct');
                correctBtn.classList.remove('text-adele-gold', 'bg-[#141210]');
                correctBtn.querySelector('div').innerHTML = '<i class="fa-solid fa-check"></i>';
                correctBtn.querySelector('div').className = 'w-4 h-4 flex items-center justify-center text-[10px] border-none text-[#141210]';
                
                card.classList.add('shake');
                userAnswers[qIdx] = false;
            }

            dot.classList.add('filled');
            solvedCount++;
            updateHeader();
        }

        function updateHeader() {
            const scoreLabel = document.getElementById('score-counter');
            scoreLabel.innerText = `${solvedCount}/15 HITS`;
            
            scoreLabel.classList.add('text-adele-gold');
            scoreLabel.classList.remove('text-adele-light');
            setTimeout(() => {
                scoreLabel.classList.remove('text-adele-gold');
                scoreLabel.classList.add('text-adele-light');
            }, 300);
        }

        function checkAllAndSubmit() {
            if (solvedCount < 15) {
                const btn = document.getElementById('submit-btn');
                btn.classList.add('shake', 'bg-adele-wrong', 'text-white', 'border-adele-wrong');
                btn.classList.remove('bg-transparent', 'border-adele-light');
                btn.innerHTML = "INCOMPLETE DATA!";
                setTimeout(() => {
                    btn.classList.remove('shake', 'bg-adele-wrong', 'text-white', 'border-adele-wrong');
                    btn.classList.add('bg-transparent', 'border-adele-light');
                    btn.innerHTML = `<i class="fa-solid fa-phone"></i> HANG UP`;
                }, 1500);
                return;
            }

            const finalCorrect = userAnswers.filter(a => a === true).length;
            const overlay = document.getElementById('success-overlay');
            const badge = document.getElementById('success-badge');
            
            document.getElementById('final-score').innerText = `SCORE: ${finalCorrect} / 15`;
            
            overlay.style.display = 'flex';
            void overlay.offsetWidth;
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            
            setTimeout(() => {
                badge.classList.remove('scale-50');
                badge.classList.add('scale-100');
                shootConfetti();
            }, 100);
        }

        function shootConfetti() {
            const container = document.getElementById('app-container');
            const colors = ['#e8dcc7', '#c8b292', '#8b6f4e'];
            for(let i=0; i<60; i++) {
                let c = document.createElement('div');
                c.className = 'confetti rounded-sm';
                c.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                c.style.left = Math.random() * 100 + '%';
                c.style.animation = `fall ${Math.random()*2+2}s linear forwards`;
                c.style.animationDelay = Math.random()*0.5+'s';
                container.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
